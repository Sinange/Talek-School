<script>
function initStaffTabs() {
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });

  loadWorkData();
  loadPaymentData();

    <tr>
      <td>${t.task}</td>
      <td>${t.due}</td>
      <td>${t.status}</td>
    </tr>
  `).join('');
}

function loadPaymentData() {
  const payments = [
    { date: '2026-04-15', desc: 'Salary Apr', amount: 35000, status: 'Paid' },
    { date: '2026-04-10', desc: 'Overtime', amount: 4200, status: 'Pending' }

      <tr>
        <td>${p.date}</td>
        <td>${p.desc}</td>
        <td>KSh ${p.amount.toLocaleString()}</td>
        <td>${p.status}</td>
        <td>${p.status === 'Paid' ? '<button>Download</button>' : '-'}</td>
      </tr>
    `;
  }).join('');

  document.getElementById('month-total').textContent = monthTotal.toLocaleString();

}
